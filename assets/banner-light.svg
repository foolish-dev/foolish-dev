<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" role="img" aria-label="foolish-dev — a neofetch card on arch + niri + tokyo night">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7aa2f7"/><stop offset="100%" stop-color="#bb9af7"/></linearGradient>
    <clipPath id="card"><rect x="0" y="0" width="900" height="210" rx="12"/></clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g clip-path="url(#card)">
    <rect x="0" y="0" width="900" height="210" fill="#1a1b26"/>
    <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace">
      <g filter="url(#glow)" fill="none" stroke="url(#mark)" stroke-width="2" stroke-linejoin="round">
        <polygon points="150,36 98,146 202,146"/>
        <polygon points="150,74 126,146 174,146"/>
      </g>
      <text x="150" y="172" text-anchor="middle" font-size="11" fill="#565f89">/* arch · niri */</text>
      <line x1="300" y1="16" x2="300" y2="176" stroke="#414868" stroke-width="1"/>
      <text x="324" y="32" font-size="14" xml:space="preserve" filter="url(#glow)"><tspan fill="#9ece6a" font-weight="600">foolish@arch</tspan><tspan fill="#7aa2f7">:~</tspan><tspan fill="#bb9af7">$</tspan><tspan fill="#c0caf5"> neofetch</tspan></text>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.45s" fill="freeze"/>
        <text x="324" y="58" font-size="13" font-weight="600" fill="#7dcfff">os</text>
        <text x="430" y="58" font-size="13" fill="#a9b1d6">arch linux · x86_64</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.48s" dur="0.45s" fill="freeze"/>
        <text x="324" y="78" font-size="13" font-weight="600" fill="#7dcfff">wm</text>
        <text x="430" y="78" font-size="13" fill="#a9b1d6">niri · scrollable-tiling wayland</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.61s" dur="0.45s" fill="freeze"/>
        <text x="324" y="98" font-size="13" font-weight="600" fill="#7dcfff">shell</text>
        <text x="430" y="98" font-size="13" fill="#a9b1d6">zsh</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.74s" dur="0.45s" fill="freeze"/>
        <text x="324" y="118" font-size="13" font-weight="600" fill="#7dcfff">editor</text>
        <text x="430" y="118" font-size="13" fill="#a9b1d6">neovim</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.87s" dur="0.45s" fill="freeze"/>
        <text x="324" y="138" font-size="13" font-weight="600" fill="#7dcfff">theme</text>
        <text x="430" y="138" font-size="13" fill="#a9b1d6">tokyo night + pywal + noctalia</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.00s" dur="0.45s" fill="freeze"/>
        <text x="324" y="158" font-size="13" font-weight="600" fill="#7dcfff">agents</text>
        <text x="430" y="158" font-size="13" fill="#a9b1d6">teleia · claude-code · hexstrike-ai</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.13s" dur="0.45s" fill="freeze"/>
        <text x="324" y="178" font-size="13" font-weight="600" fill="#7dcfff">models</text>
        <text x="430" y="178" font-size="13" fill="#a9b1d6">Janus-35B · Thanatos-27B</text>
      </g>
      <rect x="628" y="167" width="9" height="14" fill="#c0caf5" opacity="0"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" begin="1.5s" repeatCount="indefinite"/></rect>
    </g>
    <circle cx="792" cy="184" r="4" fill="#f7768e"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="806" cy="184" r="4" fill="#e0af68"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="184" r="4" fill="#9ece6a"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="834" cy="184" r="4" fill="#7dcfff"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="848" cy="184" r="4" fill="#7aa2f7"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="862" cy="184" r="4" fill="#bb9af7"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="1.0s" repeatCount="indefinite"/></circle>
  </g>
</svg>
