<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" role="img" aria-label="buy me a coffee">
  <rect x="0.75" y="0.75" width="208.5" height="50.5" rx="10" fill="#24283b" stroke="#e0af68" stroke-width="1.5"/>
  <!-- steam -->
  <g stroke="#7dcfff" stroke-width="1.7" stroke-linecap="round" fill="none">
    <path d="M25 21 q -3.5 -3 0 -7 q 3.5 -4 0 -8" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.25;0.7;1" dur="2.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 5;0 -5" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M33 21 q 3.5 -3 0 -7 q -3.5 -4 0 -8" opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75;0" keyTimes="0;0.25;0.7;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 5;0 -5" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- cup -->
  <path d="M17 25 h21 v7 a6 6 0 0 1 -6 6 h-9 a6 6 0 0 1 -6 -6 z" fill="#e0af68"/>
  <path d="M38 27 a5.5 5.5 0 0 1 0 9" fill="none" stroke="#e0af68" stroke-width="2.4"/>
  <rect x="15.5" y="40" width="25" height="2.4" rx="1.2" fill="#e0af68"/>
  <!-- label -->
  <text x="56" y="31.5" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" font-weight="600" fill="#c0caf5">buy me a coffee</text>
</svg>
