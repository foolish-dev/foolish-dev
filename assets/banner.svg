<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="foolish-dev — neofetch banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#414868" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="900" height="240" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="240" rx="14" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="899" height="239" rx="14" fill="none" stroke="#414868" stroke-width="1"/>

  <!-- arch-mountain mark -->
  <g transform="translate(130,118)" filter="url(#glow)">
    <polygon points="0,-70 70,70 -70,70" fill="none" stroke="url(#mark)" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="0,-42 52,56 -52,56" fill="none" stroke="#7aa2f7" stroke-width="1.4" stroke-linejoin="round" opacity="0.55"/>
    <polygon points="0,-14 28,42 -28,42" fill="url(#mark)" opacity="0.9"/>
  </g>
  <text x="130" y="222" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#565f89" text-anchor="middle">/* arch · niri */</text>

  <line x1="248" y1="48" x2="248" y2="192" stroke="#414868" stroke-width="1"/>

  <!-- header -->
  <text x="280" y="58" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="700" filter="url(#glow)">
    <tspan fill="url(#accent)">foolish-dev</tspan>
    <tspan dx="6" fill="#565f89" font-weight="500">@</tspan>
    <tspan dx="4" fill="#7dcfff">arch</tspan>
  </text>
  <line x1="280" y1="72" x2="860" y2="72" stroke="#414868" stroke-width="1"/>

  <!-- info rows -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="14">
    <text y="100">
      <tspan x="280" fill="#bb9af7" font-weight="600">os</tspan>
      <tspan x="380" fill="#c0caf5">Arch Linux</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#9aa5ce">x86_64</tspan>
    </text>
    <text y="122">
      <tspan x="280" fill="#bb9af7" font-weight="600">wm</tspan>
      <tspan x="380" fill="#c0caf5">niri</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#9aa5ce">scrollable-tiling wayland</tspan>
    </text>
    <text y="144">
      <tspan x="280" fill="#bb9af7" font-weight="600">shell</tspan>
      <tspan x="380" fill="#c0caf5">zsh</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">tmux</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">neovim</tspan>
    </text>
    <text y="166">
      <tspan x="280" fill="#bb9af7" font-weight="600">theme</tspan>
      <tspan x="380" fill="#c0caf5">tokyo night</tspan>
      <tspan dx="8" fill="#565f89">+</tspan>
      <tspan dx="6" fill="#9aa5ce">pywal</tspan>
    </text>
    <text y="188">
      <tspan x="280" fill="#bb9af7" font-weight="600">agents</tspan>
      <tspan x="380" fill="#c0caf5">claude-code</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">opencode</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">lm-studio</tspan>
    </text>
    <text y="210">
      <tspan x="280" fill="#bb9af7" font-weight="600">domain</tspan>
      <tspan x="380" fill="#c0caf5">offsec</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">automation</tspan>
      <tspan dx="8" fill="#565f89">·</tspan>
      <tspan dx="6" fill="#c0caf5">llm tooling</tspan>
    </text>
  </g>

  <!-- TN palette dots -->
  <g transform="translate(778,218)">
    <circle cx="0"  cy="0" r="4" fill="#f7768e"/>
    <circle cx="13" cy="0" r="4" fill="#e0af68"/>
    <circle cx="26" cy="0" r="4" fill="#9ece6a"/>
    <circle cx="39" cy="0" r="4" fill="#7dcfff"/>
    <circle cx="52" cy="0" r="4" fill="#7aa2f7"/>
    <circle cx="65" cy="0" r="4" fill="#bb9af7"/>
  </g>
</svg>
