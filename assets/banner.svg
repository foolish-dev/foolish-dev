<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="foolish-dev">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#414868" stroke-width="0.4" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- terminal frame -->
  <rect x="0" y="0" width="900" height="240" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="240" rx="14" fill="url(#grid)"/>
  <rect x="0" y="0" width="900" height="240" rx="14" fill="none" stroke="#414868" stroke-width="1"/>

  <!-- title bar -->
  <rect x="0" y="0" width="900" height="34" rx="14" fill="#16161e"/>
  <rect x="0" y="20" width="900" height="14" fill="#16161e"/>
  <circle cx="20" cy="17" r="6" fill="#f7768e"/>
  <circle cx="42" cy="17" r="6" fill="#e0af68"/>
  <circle cx="64" cy="17" r="6" fill="#9ece6a"/>
  <text x="450" y="22" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="12" fill="#565f89">foolish-dev — zsh</text>
  <line x1="0" y1="34" x2="900" y2="34" stroke="#414868" stroke-width="1"/>

  <!-- prompt + handle -->
  <g font-family="JetBrains Mono, ui-monospace, Menlo, monospace">
    <text x="40" y="92" font-size="16" fill="#9ece6a">~</text>
    <text x="60" y="92" font-size="16" fill="#7dcfff">❯</text>
    <text x="84" y="92" font-size="16" fill="#c0caf5">whoami</text>

    <text x="40" y="156" font-size="56" font-weight="700" fill="url(#accent)" filter="url(#glow)">foolish-dev</text>

    <text x="40" y="196" font-size="14" fill="#565f89">// scrollable-tiling wayland · offensive security · ai-augmented dev</text>

    <text x="40" y="222" font-size="14" fill="#9ece6a">~</text>
    <text x="60" y="222" font-size="14" fill="#7dcfff">❯</text>
    <text x="84" y="222" font-size="14" fill="#c0caf5">_</text>
    <rect x="98" y="211" width="9" height="14" fill="#7aa2f7">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- corner glyph -->
  <g transform="translate(820,60)" opacity="0.7">
    <text font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#565f89" text-anchor="end">
      <tspan x="0" y="0">┌─[ stack ]──┐</tspan>
      <tspan x="0" y="14">│ arch      │</tspan>
      <tspan x="0" y="28">│ niri      │</tspan>
      <tspan x="0" y="42">│ neovim    │</tspan>
      <tspan x="0" y="56">│ tmux      │</tspan>
      <tspan x="0" y="70">└───────────┘</tspan>
    </text>
  </g>
</svg>
