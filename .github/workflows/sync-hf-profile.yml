name: Sync README to Hugging Face profile

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - tools/hf-sync/**
      - .github/workflows/sync-hf-profile.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the staged README without uploading to the HF Space"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-hf-profile
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # Sync is a sub-minute job; cap well below the 6h default to bound CI
    # cost and surface stuck runs quickly.
    timeout-minutes: 5
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    steps:
      - uses: actions/checkout@v7

      # cargo is preinstalled on ubuntu-latest; just cache the registry + build.
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/hf-sync/target
          key: ${{ runner.os }}-cargo-hf-sync-${{ hashFiles('tools/hf-sync/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-hf-sync-

      - name: Build staged README
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: cargo run --quiet --manifest-path tools/hf-sync/Cargo.toml -- build

      - name: Upload staged README artifact (dry-run)
        if: env.DRY_RUN == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: hf-staged-readme
          path: .hf-out/README.md

      - name: Push README to FoolDev/FoolDev Space
        if: env.DRY_RUN != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: cargo run --quiet --manifest-path tools/hf-sync/Cargo.toml -- push
