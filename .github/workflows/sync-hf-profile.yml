name: Sync README to Hugging Face profile

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/sync-hf-profile.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-hf-profile
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.25"

      - name: Build HF README (rewrite asset paths + preserve Space frontmatter)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p .hf-out
          python <<'PY'
          import os, re, pathlib, urllib.request
          repo = os.environ["GITHUB_REPOSITORY"]  # foolish-dev/foolish-dev
          base = f"https://raw.githubusercontent.com/{repo}/main/"

          # 1. Rewrite relative asset references (src=, srcset=, and ![](assets/...))
          #    so HF can resolve images that live only in the GitHub repo.
          src = pathlib.Path("README.md").read_text(encoding="utf-8")
          src = re.sub(
              r'((?:src|srcset)=")(?!https?://|/|#)(assets/[^"]+)(")',
              lambda m: m.group(1) + base + m.group(2) + m.group(3),
              src,
          )
          src = re.sub(
              r'(!\[[^\]]*\]\()(?!https?://|/|#)(assets/[^)]+)(\))',
              lambda m: m.group(1) + base + m.group(2) + m.group(3),
              src,
          )

          # 2. Strip any leading YAML frontmatter that may already be in the GitHub
          #    README (we replace it from the live Space below).
          if src.startswith("---\n"):
              end = src.find("\n---\n", 4)
              if end != -1:
                  src = src[end + len("\n---\n"):].lstrip("\n")

          # 3. Fetch the live Space README and pull its YAML frontmatter so we
          #    don't clobber Space metadata (title, sdk: static, pinned, ...).
          req = urllib.request.Request(
              "https://huggingface.co/spaces/FoolDev/FoolDev/raw/main/README.md",
              headers={"Authorization": f"Bearer {os.environ['HF_TOKEN']}"},
          )
          frontmatter = ""
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  cur = r.read().decode("utf-8")
              if cur.startswith("---\n"):
                  end = cur.find("\n---\n", 4)
                  if end != -1:
                      frontmatter = cur[: end + len("\n---\n")]
          except Exception as e:
              print(f"warning: could not fetch existing Space frontmatter: {e}")

          # Fallback frontmatter if the Space README wasn't reachable.
          if not frontmatter:
              frontmatter = (
                  "---\n"
                  "title: FoolDev\n"
                  "emoji: ⚡\n"
                  "colorFrom: blue\n"
                  "colorTo: purple\n"
                  "sdk: static\n"
                  "pinned: true\n"
                  "short_description: profile card · Janus models · dotfiles · agents\n"
                  "---\n"
              )

          out = frontmatter + "\n" + src.lstrip("\n")
          pathlib.Path(".hf-out/README.md").write_text(out, encoding="utf-8")
          print(f"hf README built: {len(out)} bytes, frontmatter preserved")
          PY

      - name: Push README to FoolDev/FoolDev (Space) on the Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj=".hf-out/README.md",
              path_in_repo="README.md",
              repo_id="FoolDev/FoolDev",
              repo_type="space",
              commit_message=f"Sync README from {os.environ.get('GITHUB_REPOSITORY')}@{os.environ.get('GITHUB_SHA','')[:7]}",
          )
          print("Uploaded README.md to space FoolDev/FoolDev")
          PY
