# Waka readme — pulls wakatime coding stats into README.md between
# <!--START_SECTION:waka--> and <!--END_SECTION:waka--> markers.
#
# Setup (one-time):
#   1. Sign up / install wakatime + editor plugin (nvim, etc.) → https://wakatime.com
#   2. Grab your API key from https://wakatime.com/api-key
#   3. Add it as a repo secret: Settings → Secrets and variables → Actions
#      → New repository secret → Name: WAKATIME_API_KEY, Value: <key>
#   4. First run populates the README. Daily cron refreshes it.

name: Waka readme

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: waka
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: athul/waka-readme@8539bedb8277066fc9fe1b47d1f9b108eb866494 # v0.3.1
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: "false"
          BLOCKS: "▒█"
          CODE_LANG: "text"
          TIME_RANGE: "last_7_days"
          SHOW_TOTAL: "true"
          SHOW_OS: "true"
          SHOW_EDITORS: "true"
          SHOW_PROJECTS: "true"
