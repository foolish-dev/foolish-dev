name: Generate snake

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    # Snake gen + push to `output` branch is a sub-minute job; cap well below
    # the 6h default so a stuck run fails fast instead of burning the budget.
    timeout-minutes: 5
    steps:
      # Generate the contribution-graph snake animation in Tokyo Night palette,
      # in both dark and light variants. README references both at the `output`
      # branch.
      - uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=%23bb9af7&color_dots=%2316161e,%23565f89,%237aa2f7,%23bb9af7,%237dcfff
            dist/snake-light.svg?color_snake=%232e7de9&color_dots=%23f5f5f7,%23c4c8da,%237aa2f7,%232e7de9,%239854f1

      # Push generated assets to the `output` branch consumed by the README.
      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "ci(snake): refresh contribution snake (${{ github.sha }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
